name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: portfolio-mido
            context: apps/Mido
          - image: portfolio-legacy
            context: apps/LegacyPoc
          - image: portfolio-pivot
            context: apps/pivotSeoul
          - image: portfolio-allohub
            context: apps/AlloHub
          - image: portfolio-allohub-web
            context: apps/AlloHub/front
          - image: portfolio-if
            context: apps/IF
          - image: portfolio-golmok
            context: apps/golmok
          - image: portfolio-briefly
            context: apps/Briefly
          - image: portfolio-briefly-web
            context: apps/Briefly/front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: siren8289
          password: ${{ secrets.GHCR_PAT }}

      # TODO:
      # Re-enable BuildKit cache after switching to docker-container builder.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ghcr.io/siren8289/${{ matrix.image }}:latest
            ghcr.io/siren8289/${{ matrix.image }}:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: siren8289
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ~/my-portfolio
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            bash deploy/scripts/deploy.sh
