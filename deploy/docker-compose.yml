services:
  nginx:
    image: nginx:latest
    container_name: portfolio-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mido-app
      - briefly-app
      - allohub-app
      - golmok-app
      - if-app
      - pivot-app
      - legacy-app

  mido-oracle:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: mido-oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
    volumes:
      - mido-oracle-data:/opt/oracle/oradata

  mido-app:
    build: ../apps/Mido
    container_name: mido-app
    ports:
      - "8080:8080"
    depends_on:
      - mido-oracle
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /mido
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@mido-oracle:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: SYSTEM
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver

  briefly-oracle:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: briefly-oracle
    ports:
      - "1522:1521"
      - "5501:5500"
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
    volumes:
      - briefly-oracle-data:/opt/oracle/oradata

  briefly-app:
    build: ../apps/Briefly
    container_name: briefly-app
    ports:
      - "8081:8080"
    depends_on:
      - briefly-oracle
    environment:
      DB_URL: jdbc:oracle:thin:@briefly-oracle:1521/FREEPDB1
      DB_USERNAME: SYSTEM
      DB_PASSWORD: ${ORACLE_PASSWORD}

  allohub-oracle:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: allohub-oracle
    ports:
      - "1523:1521"
      - "5502:5500"
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}
    volumes:
      - allohub-oracle-data:/opt/oracle/oradata

  allohub-app:
    build: ../apps/AlloHub
    container_name: allohub-app
    ports:
      - "8082:8080"
    depends_on:
      - allohub-oracle
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /allohub
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@allohub-oracle:1521/FREEPDB1
      SPRING_DATASOURCE_USERNAME: SYSTEM
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver

  golmok-oracle:
