services:
  nginx:
    image: nginx:latest
    container_name: portfolio-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mido-app
      - legacy-app
      - pivot-app
      - allohub-app
      - if-app
      - golmok-app
      - briefly-app
    networks:
      - portfolio-network
    restart: unless-stopped

  mido-app:
    build: ../apps/Mido
    container_name: mido-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /mido
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  legacy-app:
    build: ../apps/LegacyPoc
    container_name: legacy-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /legacy
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  pivot-app:
    build: ../apps/pivotSeoul
    container_name: pivot-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /pivot
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  allohub-app:
    build: ../apps/AlloHub
    container_name: allohub-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /allohub
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  if-app:
    build: ../apps/IF
    container_name: if-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /if
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  golmok-app:
    build: ../apps/golmok
    container_name: golmok-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /golmok
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

  briefly-app:
    build: ../apps/Briefly
    container_name: briefly-app
    expose:
      - "8080"
    environment:
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge
