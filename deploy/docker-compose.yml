# Production / EC2 — GHCR pre-built images (no build on EC2)
x-app-healthcheck: &app-healthcheck
  interval: 15s
  timeout: 5s
  retries: 12
  start_period: 120s
  test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/127.0.0.1/8080' || exit 1"]

x-web-healthcheck: &web-healthcheck
  interval: 15s
  timeout: 5s
  retries: 12
  start_period: 20s
  test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]

services:
  nginx:
    image: nginx:latest
    container_name: portfolio-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      mido-app:
        condition: service_healthy
      legacy-app:
        condition: service_healthy
      pivot-app:
        condition: service_healthy
      allohub-app:
        condition: service_healthy
      if-app:
        condition: service_healthy
      golmok-app:
        condition: service_healthy
      briefly-app:
        condition: service_healthy
      briefly-web:
        condition: service_healthy
      allohub-web:
        condition: service_healthy
      pivot-web:
        condition: service_healthy
      mido-web:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped

  mido-db:
    image: postgres:16-alpine
    container_name: mido-db
    environment:
      POSTGRES_DB: ${MIDO_DB_NAME:-mido}
      POSTGRES_USER: ${MIDO_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${MIDO_DB_PASSWORD}
    volumes:
      - mido_pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
      test: ["CMD-SHELL", "pg_isready -U ${MIDO_DB_USER:-postgres} -d ${MIDO_DB_NAME:-mido}"]

  mido-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-mido:${GHCR_IMAGE_TAG:-latest}
    container_name: mido-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /mido
      SPRING_PROFILES_ACTIVE: ${MIDO_SPRING_PROFILE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://mido-db:5432/${MIDO_DB_NAME:-mido}
      SPRING_DATASOURCE_USERNAME: ${MIDO_DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${MIDO_DB_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    depends_on:
      mido-db:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  mido-web:
    image: ${MIDO_WEB_IMAGE:-ghcr.io/siren8289porfolio/portfolio-mido-web:latest}
    container_name: mido-web
    environment:
      API_CONTEXT_PATH: /mido
      API_URL: http://mido-app:8080
    expose:
      - "3000"
    depends_on:
      mido-app:
        condition: service_healthy
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck:
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/mido || exit 1"]

  legacy-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-legacy:${GHCR_IMAGE_TAG:-latest}
    container_name: legacy-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /legacy
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  pivot-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-pivot:${GHCR_IMAGE_TAG:-latest}
    container_name: pivot-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /pivot
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  pivot-web:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-pivot-web:${GHCR_IMAGE_TAG:-latest}
    container_name: pivot-web
    expose:
      - "80"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *web-healthcheck

  allohub-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-allohub:${GHCR_IMAGE_TAG:-latest}
    container_name: allohub-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /allohub
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  allohub-web:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-allohub-web:${GHCR_IMAGE_TAG:-latest}
    container_name: allohub-web
    expose:
      - "80"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *web-healthcheck

  if-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-if:${GHCR_IMAGE_TAG:-latest}
    container_name: if-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /if
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  golmok-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-golmok:${GHCR_IMAGE_TAG:-latest}
    container_name: golmok-app
    expose:
      - "8080"
    environment:
      SERVER_SERVLET_CONTEXT_PATH: /golmok
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-local}
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  briefly-app:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-briefly:${GHCR_IMAGE_TAG:-latest}
    container_name: briefly-app
    expose:
      - "8080"
    environment:
      TZ: ${TZ:-Asia/Seoul}
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *app-healthcheck

  briefly-web:
    image: ghcr.io/${GHCR_OWNER:-siren8289}/portfolio-briefly-web:${GHCR_IMAGE_TAG:-latest}
    container_name: briefly-web
    expose:
      - "80"
    networks:
      - portfolio-network
    restart: unless-stopped
    healthcheck: *web-healthcheck

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge

volumes:
  mido_pg_data:
    name: portfolio_mido_pg_data
    external: true
