# Local Mac only — build from source (Phase 1). EC2 / CI does not use this file.
services:
  mido-app:
    build: ../apps/Mido
  legacy-app:
    build: ../apps/LegacyPoc
  pivot-app:
    build: ../apps/pivotSeoul
  allohub-app:
    build: ../apps/AlloHub
  if-app:
    build: ../apps/IF
  golmok-app:
    build: ../apps/golmok
    environment:
      SPRING_DATASOURCE_PASSWORD: ${GOLMOK_DB_PASSWORD:-localdev}
  golmok-db:
    environment:
      POSTGRES_PASSWORD: ${GOLMOK_DB_PASSWORD:-localdev}
  golmok-web:
    build: ../apps/golmok/front
  briefly-app:
    build: ../apps/Briefly
