server {
    listen 80;
    server_name _;

    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Docker 임베디드 DNS. 컨테이너가 재생성되어 IP가 바뀌어도
    # proxy_pass에 변수를 쓰면 nginx가 이 resolver로 주기적으로 재조회한다.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }

    location = /mido {
        return 301 /mido/;
    }
    # /mido/api/* 는 mido-app(백엔드)의 실제 서블릿 경로(context-path가 이미 /mido)로
    # 그대로 전달한다. URI를 바꾸지 않는다.
    location /mido/api/ {
        set $upstream_mido mido-app:8080;
        proxy_pass http://$upstream_mido;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /mido/* 는 실제 프론트(React SPA static export, mido-web)가 서빙.
    # proxy_pass에 변수(host)를 쓰면 nginx가 location 접두사를 자동으로 벗겨내지
    # 않으므로(트레일링 슬래시가 있어도 항상 "/"로만 전달됨), rewrite로 먼저
    # "/mido/" 접두사를 직접 제거한 뒤 URI 없이 proxy_pass 한다.
    location /mido/ {
        set $upstream_mido_web mido-web:80;
        rewrite ^/mido/(.*)$ /$1 break;
        proxy_pass http://$upstream_mido_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legacy {
        return 301 /legacy/;
    }
    location = /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy/legacy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pivot {
        return 301 /pivot/;
    }
    # /pivot/api/* 는 백엔드가 이미 context-path(/pivot)를 포함한 전체 경로를
    # 그대로 기대하므로 URI를 바꾸지 않고 그대로 전달한다.
    location /pivot/api/ {
        set $upstream_pivot pivot-app:8080;
        proxy_pass http://$upstream_pivot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /pivot/* 는 정적 프론트(Next.js static export, pivot-web)가 서빙.
    # (mido와 동일한 이유로 rewrite break 후 URI 없이 proxy_pass)
    location /pivot/ {
        set $upstream_pivot_web pivot-web:80;
        rewrite ^/pivot/(.*)$ /$1 break;
        proxy_pass http://$upstream_pivot_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /allohub {
        return 301 /allohub/;
    }
    # /allohub/api/* 는 백엔드가 이미 context-path(/allohub)를 포함한 전체 경로를
    # 그대로 기대하므로 URI를 바꾸지 않고 그대로 전달한다.
    location /allohub/api/ {
        set $upstream_allohub allohub-app:8080;
        proxy_pass http://$upstream_allohub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /allohub/* 는 정적 프론트(Next.js static export, allohub-web)가 서빙.
    # (mido와 동일한 이유로 rewrite break 후 URI 없이 proxy_pass)
    location /allohub/ {
        set $upstream_allohub_web allohub-web:80;
        rewrite ^/allohub/(.*)$ /$1 break;
        proxy_pass http://$upstream_allohub_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /if {
        return 301 /if/;
    }
    # swagger-ui index.html이 ./swagger-ui-bundle.js 같은 상대경로를 쓰므로
    # 내부 proxy_pass(주소창 유지) 대신 브라우저 리다이렉트로 실제 경로로 이동시켜야
    # 이후 상대경로 asset 요청(/if/swagger-ui/*)이 올바르게 해석된다.
    location = /if/ {
        return 302 /if/swagger-ui/index.html;
    }
    location /if/ {
        set $upstream_if if-app:8080;
        proxy_pass http://$upstream_if;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /golmok {
        return 301 /golmok/;
    }
    # /golmok/api/* 는 golmok-app이 이미 context-path(/golmok)를 포함한 전체 경로를
    # 그대로 기대하므로 URI를 바꾸지 않고 그대로 전달한다.
    location /golmok/api/ {
        set $upstream_golmok golmok-app:8080;
        proxy_pass http://$upstream_golmok;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /golmok/* 는 정적 프론트(Next.js static export, golmok-web)가 서빙.
    # (mido와 동일한 이유로 rewrite break 후 URI 없이 proxy_pass)
    location /golmok/ {
        set $upstream_golmok_web golmok-web:80;
        rewrite ^/golmok/(.*)$ /$1 break;
        proxy_pass http://$upstream_golmok_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /briefly {
        return 301 /briefly/;
    }
    # briefly-web(React SPA)은 실제 JSON API가 없는 상태라 화면이 비어 보이는
    # 문제가 있었다. 이미 완전히 동작하는 JSP 기반 백엔드(로그인/펀드/신청/
    # 워치리스트/알림/관리자)가 있으므로 /briefly/* 는 백엔드로 직접 라우팅한다.
    # 백엔드 context-path가 이미 /briefly이므로 URI를 바꾸지 않고 그대로 전달한다.
    location /briefly/ {
        set $upstream_briefly briefly-app:8080;
        proxy_pass http://$upstream_briefly;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
