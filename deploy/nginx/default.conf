server {
    listen 80;
    server_name _;

    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Docker 임베디드 DNS. 컨테이너가 재생성되어 IP가 바뀌어도
    # proxy_pass에 변수를 쓰면 nginx가 이 resolver로 주기적으로 재조회한다.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }

    location = /mido {
        return 301 /mido/;
    }
    location = /mido/ {
        set $upstream_mido mido-app:8080;
        proxy_pass http://$upstream_mido/mido/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /mido/ {
        set $upstream_mido mido-app:8080;
        proxy_pass http://$upstream_mido;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legacy {
        return 301 /legacy/;
    }
    location = /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy/legacy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pivot {
        return 301 /pivot/;
    }
    location = /pivot/ {
        set $upstream_pivot pivot-app:8080;
        proxy_pass http://$upstream_pivot/pivot/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /pivot/ {
        set $upstream_pivot pivot-app:8080;
        proxy_pass http://$upstream_pivot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /allohub {
        return 301 /allohub/;
    }
    location = /allohub/ {
        set $upstream_allohub allohub-app:8080;
        proxy_pass http://$upstream_allohub/allohub/actuator/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /allohub/ {
        set $upstream_allohub allohub-app:8080;
        proxy_pass http://$upstream_allohub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /if {
        return 301 /if/;
    }
    # swagger-ui index.html이 ./swagger-ui-bundle.js 같은 상대경로를 쓰므로
    # 내부 proxy_pass(주소창 유지) 대신 브라우저 리다이렉트로 실제 경로로 이동시켜야
    # 이후 상대경로 asset 요청(/if/swagger-ui/*)이 올바르게 해석된다.
    location = /if/ {
        return 302 /if/swagger-ui/index.html;
    }
    location /if/ {
        set $upstream_if if-app:8080;
        proxy_pass http://$upstream_if;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /golmok {
        return 301 /golmok/;
    }
    location = /golmok/ {
        set $upstream_golmok golmok-app:8080;
        proxy_pass http://$upstream_golmok/golmok/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /golmok/ {
        set $upstream_golmok golmok-app:8080;
        proxy_pass http://$upstream_golmok;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /briefly {
        return 301 /briefly/;
    }
    location = /briefly/ {
        set $upstream_briefly briefly-app:8080;
        proxy_pass http://$upstream_briefly/briefly/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /briefly/ {
        set $upstream_briefly briefly-app:8080;
        proxy_pass http://$upstream_briefly;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
