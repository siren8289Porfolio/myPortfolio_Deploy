server {
    listen 80;

    location /mido/ {
        proxy_pass http://mido-app:8080/mido/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /briefly/ {
        proxy_pass http://briefly-app:8080/briefly/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /allohub/ {
        proxy_pass http://allohub-app:8080/allohub/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /golmok/ {
        proxy_pass http://golmok-app:8080/golmok/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /if/ {
        proxy_pass http://if-app:8080/if/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /pivot/ {
        proxy_pass http://pivot-app:8080/pivot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /legacy/ {
        proxy_pass http://legacy-app:8080/legacy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
