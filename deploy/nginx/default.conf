server {
    listen 80;
    server_name _;

    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Docker 임베디드 DNS. 컨테이너가 재생성되어 IP가 바뀌어도
    # proxy_pass에 변수를 쓰면 nginx가 이 resolver로 주기적으로 재조회한다.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }

    location = /mido {
        return 301 /mido/;
    }
    # /mido/api/* 는 mido-app(백엔드)의 실제 서블릿 경로(context-path가 이미 /mido)로
    # 그대로 전달한다. URI를 바꾸지 않는다.
    location /mido/api/ {
        set $upstream_mido mido-app:8080;
        proxy_pass http://$upstream_mido;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /mido/* 는 실제 프론트(Next.js standalone, mido-web)가 서빙.
    location /mido/ {
        set $upstream_mido_web mido-web:3000;
        proxy_pass http://$upstream_mido_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legacy {
        return 301 /legacy/;
    }
    location = /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy/legacy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /legacy/ {
        set $upstream_legacy legacy-app:8080;
        proxy_pass http://$upstream_legacy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pivot {
        return 301 /pivot/;
    }
    # /pivot/api/* 는 백엔드가 이미 context-path(/pivot)를 포함한 전체 경로를
    # 그대로 기대하므로 URI를 바꾸지 않고 그대로 전달한다.
    location /pivot/api/ {
        set $upstream_pivot pivot-app:8080;
        proxy_pass http://$upstream_pivot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /pivot/* 는 정적 프론트(Next.js static export, pivot-web)가 서빙.
    location /pivot/ {
        set $upstream_pivot_web pivot-web:80;
        proxy_pass http://$upstream_pivot_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /allohub {
        return 301 /allohub/;
    }
    # /allohub/api/* 는 백엔드가 이미 context-path(/allohub)를 포함한 전체 경로를
    # 그대로 기대하므로 URI를 바꾸지 않고 그대로 전달한다.
    location /allohub/api/ {
        set $upstream_allohub allohub-app:8080;
        proxy_pass http://$upstream_allohub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /allohub/* 는 정적 프론트(Next.js static export, allohub-web)가 서빙.
    location /allohub/ {
        set $upstream_allohub_web allohub-web:80;
        proxy_pass http://$upstream_allohub_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /if {
        return 301 /if/;
    }
    # swagger-ui index.html이 ./swagger-ui-bundle.js 같은 상대경로를 쓰므로
    # 내부 proxy_pass(주소창 유지) 대신 브라우저 리다이렉트로 실제 경로로 이동시켜야
    # 이후 상대경로 asset 요청(/if/swagger-ui/*)이 올바르게 해석된다.
    location = /if/ {
        return 302 /if/swagger-ui/index.html;
    }
    location /if/ {
        set $upstream_if if-app:8080;
        proxy_pass http://$upstream_if;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /golmok {
        return 301 /golmok/;
    }
    location = /golmok/ {
        set $upstream_golmok golmok-app:8080;
        proxy_pass http://$upstream_golmok/golmok/api/v1/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /golmok/ {
        set $upstream_golmok golmok-app:8080;
        proxy_pass http://$upstream_golmok;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /briefly {
        return 301 /briefly/;
    }
    # /briefly/api/* → briefly-app의 실제 서블릿 경로(/briefly/*)로 변환해서 전달.
    # 프론트 페이지 경로(/briefly/funds 등)와 백엔드 API 경로가 겹치는 것을 막기 위해
    # 프론트는 항상 /briefly/api/* 로 호출하고, 여기서 /api 세그먼트를 제거한다.
    location /briefly/api/ {
        set $upstream_briefly briefly-app:8080;
        proxy_pass http://$upstream_briefly/briefly/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # 그 외 /briefly/* 는 정적 프론트(briefly-web)가 서빙. 컨테이너 루트로 넘기고
    # 컨테이너 안의 nginx가 SPA fallback(try_files ... /index.html)을 처리한다.
    location /briefly/ {
        set $upstream_briefly_web briefly-web:80;
        proxy_pass http://$upstream_briefly_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
