spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    # 기본값(1)이면 기존 EC2 DB에 baseline만 찍히고 V1이 스킵되어 status 컬럼이
    # 추가되지 않은 채 ddl-auto=validate가 실패한다.
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
