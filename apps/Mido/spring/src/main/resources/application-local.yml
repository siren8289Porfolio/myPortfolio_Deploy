spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:mido;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  devtools:
    livereload:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.mido.verification: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
