<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입출고 관리</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="wrap">
    <h1>입출고 관리 (Vanilla JS)</h1>
    <div class="toolbar">
        <button id="loadBtn">조회</button>
        <button id="createBtn">신규 등록</button>
    </div>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>창고명</th><th>상품코드</th><th>상품명</th><th>입고</th><th>출고</th><th>재고</th><th>상태</th>
        </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-box">
        <h3>입출고 등록</h3>
        <label>창고명 <input id="warehouseName"></label>
        <label>상품코드 <input id="productCode"></label>
        <label>상품명 <input id="productName"></label>
        <label>분류 <input id="productCategory"></label>
        <label>입고수량 <input id="inQty" type="number"></label>
        <label>출고수량 <input id="outQty" type="number"></label>
        <label>현재재고 <input id="currentStock" type="number"></label>
        <label>거래처 <input id="clientName"></label>
        <label>상태 <input id="status"></label>
        <div class="actions">
            <button id="saveBtn">등록</button>
            <button id="closeBtn">닫기</button>
        </div>
    </div>
</div>

<script src="/js/warehouse.js"></script>
</body>
</html>
