<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 현황 화면 (레거시 샘플)</title>
    <link rel="stylesheet" href="../static/css/site.css">
    <link rel="stylesheet" href="../static/css/order-status.css">
</head>
<body>
<div class="topbar">
    <div class="brand">레거시 운영 포털</div>
    <div class="topbar-meta">주문현황 / v0.9 레거시</div>
</div>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-title">메인 메뉴</div>
        <a class="menu-link" href="investor.html">투자자 관리</a>
        <a class="menu-link" href="warehouse-io.html">입출고 처리</a>
        <a class="menu-link active" href="order-status.html">주문 현황</a>
        <a class="menu-link" href="settlement.html">정산 관리</a>
        <a class="menu-link" href="dashboard.html">통합 대시보드</a>
    </aside>
    <main class="content">
        <h1 class="page-title">주문 현황 화면</h1>
        <p class="page-subtitle">주문 조회/상태 체크를 한 화면에서 처리하는 구조</p>
        <section class="kpi-row">
            <div class="kpi-card"><div class="kpi-label">전체 주문</div><div class="kpi-value">492</div></div>
            <div class="kpi-card"><div class="kpi-label">처리중</div><div class="kpi-value">41</div></div>
            <div class="kpi-card"><div class="kpi-label">완료</div><div class="kpi-value">438</div></div>
            <div class="kpi-card"><div class="kpi-label">반려</div><div class="kpi-value">13</div></div>
        </section>
        <section class="panel">
            <h2 class="panel-title">주문 목록</h2>
            <div class="search-panel">
                <label for="searchName">고객명</label>
                <input type="text" id="searchName" placeholder="고객명">
                <button id="searchBtn">조회</button>
            </div>
            <table id="orderTable">
                <thead>
                <tr>
                    <th>주문ID</th>
                    <th>고객명</th>
                    <th>상태</th>
                    <th>주문금액</th>
                    <th>최근상품</th>
                    <th>메모</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../static/js/common-table.js"></script>
<script src="../static/js/order-status.js"></script>
</body>
</html>
