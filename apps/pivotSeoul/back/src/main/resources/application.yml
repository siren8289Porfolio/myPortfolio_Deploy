server:
  port: 8080
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}

spring:
  application:
    name: pivotseoul-back
  flyway:
    enabled: false
  jpa:
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    tags:
      application: pivotseoul-back

pivotseoul:
  ai:
    fastapi-base-url: ${PIVOT_FASTAPI_BASE_URL:http://127.0.0.1:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
  cors:
    allowed-origins: ${PIVOT_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
