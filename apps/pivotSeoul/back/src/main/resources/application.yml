server:
  port: 8080
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}

spring:
  application:
    name: pivotseoul-back
  flyway:
    enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:SYSTEM}
    password: ${SPRING_DATASOURCE_PASSWORD:Oracle1234}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    tags:
      application: pivotseoul-back

pivotseoul:
  ai:
    fastapi-base-url: ${PIVOT_FASTAPI_BASE_URL:http://127.0.0.1:8000}
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
  cors:
    allowed-origins: ${PIVOT_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
