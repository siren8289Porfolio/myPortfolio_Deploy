spring:
  application:
    name: dasi-golmok-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dasi_golmok}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:app_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:dasi-golmok-dev-secret-change-in-production-min-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  version: ${APP_VERSION:0.1.0}
