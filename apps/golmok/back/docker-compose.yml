services:
  db:
    image: postgres:16-alpine
    container_name: dasi-golmok-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app_password}
      POSTGRES_DB: ${DB_NAME:-dasi_golmok}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-app_user} -d ${DB_NAME:-dasi_golmok}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
