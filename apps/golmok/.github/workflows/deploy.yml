name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://app_user:app_password@localhost:5432/dasi_golmok
  NEXTAUTH_SECRET: ci-test-secret-key-not-for-production
  NEXTAUTH_URL: http://localhost:3000
  CORS_ALLOWED_ORIGINS: http://localhost:3000
  BACKEND_URL: http://localhost:8080

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: dasi_golmok
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d dasi_golmok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm install

      - name: Setup database
        run: npm run db:setup -w back

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Start backend
        run: npm run start -w back &

      - name: Start frontend
        run: npm run start -w front &

      - name: Wait and health check
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/v1/health && break
            sleep 2
          done
          curl -sf http://localhost:8080/api/v1/health | grep -q '"status":"UP"'
          curl -sf http://localhost:3000/api/v1/regions | grep -q '"success":true'

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
