server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # /stories/[storyId]는 빌드 시점에 알 수 없는 동적 경로라 static export가
    # 만든 placeholder(stories/_.html)로 폴백한다. /stories/new 같은 실제 정적
    # 페이지는 $uri.html이 존재하므로 그대로 서빙된다.
    location /stories/ {
        try_files $uri $uri.html /stories/_.html;
    }

    location / {
        try_files $uri $uri.html /index.html;
    }
}
