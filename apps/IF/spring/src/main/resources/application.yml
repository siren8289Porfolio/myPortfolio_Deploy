app:
  ai:
    base-url: ${APP_AI_BASE_URL:http://localhost:8000}

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}

spring:
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
