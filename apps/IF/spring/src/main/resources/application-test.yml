spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:if_spring_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        generate_statistics: true

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
