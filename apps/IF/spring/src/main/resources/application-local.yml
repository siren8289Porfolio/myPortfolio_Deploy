server:
  port: 8080
  address: 0.0.0.0

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:if_spring;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  sql:
    init:
      mode: never
