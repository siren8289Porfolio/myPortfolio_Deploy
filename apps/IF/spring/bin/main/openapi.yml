openapi: 3.0.3
info:
  title: IF Risk Assessment API
  description: 고령자 노동·돌봄 판단 시스템 API
  version: 0.1.0

# ✅ [프론트] 이 서버 URL로 API 호출
# ✅ [백엔드] 로컬 실행 포트/도메인 바뀌면 여기 수정 or 환경별 servers 추가
servers:
  - url: http://localhost:8080
    description: Local Server

paths:

  # ==========================================================
  # 1) Applicant (신청자)
  # ==========================================================

  /api/applicants:
    get:
      tags:
        - Applicant

      # ✅ [프론트] "신청자 목록 화면"에서 이 API 호출
      # ✅ [백엔드] ApplicantController.listApplicants() 같은 메서드로 매핑
      summary: 신청자 목록 조회
      operationId: listApplicants

      # ✅ [프론트] Query 파라미터 없음 → 그냥 GET 호출하면 됨
      # ✅ [백엔드] 추후 paging/sort/search 넣을 거면 parameters에 query로 추가
      responses:
        "200":
          description: 신청자 목록 조회 성공

          # ✅ [프론트] 응답이 배열인지 / 객체인지 여기서 확정
          # ✅ [백엔드] 실제 반환 타입: List<ApplicantResponse> (또는 ApiResponse 래핑 시 변경 필요)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicantResponse"

    post:
      tags:
        - Applicant

      # ✅ [프론트] "신청자 등록 폼"에서 이 API 호출
      # ✅ [백엔드] ApplicantController.createApplicant() 구현
      summary: 신청자 생성
      operationId: createApplicant

      # ✅ [프론트] body로 보내야 할 JSON 구조를 여기서 확인
      # ✅ [백엔드] @RequestBody ApplicantCreateRequest 로 받으면 됨
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicantCreateRequest"

      responses:
        "201":
          description: 신청자 생성 성공

          # ✅ [프론트] 생성 후 화면 갱신에 필요한 id/createdAt 등의 정보 확인
          # ✅ [백엔드] 반환은 ApplicantResponse 또는 최소 응답(예: {id, createdAt})로 바꿀 수도 있음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicantResponse"


  /api/applicants/{id}:
    get:
      tags:
        - Applicant

      # ✅ [프론트] "신청자 상세 페이지" 진입 시 이 API 호출
      # ✅ [백엔드] ApplicantController.getApplicant(@PathVariable Long id)
      summary: 신청자 단건 조회
      operationId: getApplicant

      parameters:
        # ✅ [프론트] URL 경로에 반드시 id를 넣어야 함: /api/applicants/1
        # ✅ [백엔드] path variable이므로 @PathVariable 사용
        - name: id
          in: path
          required: true
          description: 신청자 ID
          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: 신청자 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicantResponse"

        # ✅ [프론트] 404면 "없는 신청자" 처리(리다이렉트/토스트 등)
        # ✅ [백엔드] Optional.empty() / EntityNotFoundException 등을 404로 매핑
        "404":
          description: 신청자 없음


  # ==========================================================
  # 2) Assessment (판단)
  # ==========================================================

  /api/applicants/{applicantId}/assessments:
    post:
      tags:
        - Assessment

      # ✅ [프론트] "신청자 기준으로 판단 생성" 버튼 눌렀을 때 호출
      # ✅ [백엔드] AssessmentController.createAssessment(@PathVariable applicantId, @RequestBody ...)
      summary: 신규 판단 생성
      operationId: createAssessment

      parameters:
        # ✅ [프론트] 이 API는 applicantId를 path로 요구함:
        #    POST /api/applicants/1/assessments
        # ✅ [백엔드] applicantId는 @PathVariable Long applicantId 로 수신
        - name: applicantId
          in: path
          required: true
          description: 신청자 ID
          schema:
            type: integer
            format: int64

      requestBody:
        required: true
        content:
          application/json:
            schema:
              # ✅ [프론트] jobId, healthId를 body로 넣어야 함
              # ✅ [백엔드] adminId는 body로 받지 않음(인증 도입 시 토큰에서 꺼냄)
              $ref: "#/components/schemas/AssessmentCreateRequest"

      responses:
        "201":
          description: 판단 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentResponse"

components:
  schemas:

    # ==========================================================
    # Applicant DTO
    # ==========================================================

    ApplicantCreateRequest:
      type: object
      required:
        - displayName
        - age
      properties:
        displayName:
          type: string
          description: 신청자 표시 이름 (마스킹 가능)

          # ✅ [프론트] 입력창에 들어갈 값/예시
          # ✅ [백엔드] 저장 시 원본/마스킹 정책은 service에서 처리 권장
          example: 이OO

        age:
          type: integer
          description: 신청자 나이 (만 나이 기준)

          # ✅ [프론트] 숫자 입력, 최소/최대 validation을 UI에서 먼저 걸어도 좋음
          # ✅ [백엔드] @Min/@Max 같은 Bean Validation 강력 추천
          example: 68

    ApplicantResponse:
      type: object
      required:
        - id
        - displayName
        - age
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          description: 신청자 ID (External ID)
          example: 1

          # ✅ [프론트] 이후 상세 조회 / 판단 생성 시 이 id 사용
          # ✅ [백엔드] DB PK(Long) 그대로 쓰는 중. 나중에 UUID로 바꾸면 이 필드 영향 큼(주의)

        displayName:
          type: string
          description: 신청자 표시 이름 (마스킹됨)
          example: 이*O

          # ✅ [프론트] 이미 마스킹된 값이 내려온다고 가정 → UI에서 추가 마스킹 불필요
          # ✅ [백엔드] 마스킹 책임은 service 계층이 가져가는 게 유지보수에 좋음

        age:
          type: integer
          description: 조회 시점 기준 나이
          example: 70

          # ✅ [프론트] 숫자 그대로 표시
          # ✅ [백엔드] age 정책 바뀌면(예: birthYear로 전환) API 버전/필드 변경 고려

        createdAt:
          type: string
          format: date-time
          description: 생성 일시 (ISO-8601, UTC)
          example: 2026-02-10T10:00:00Z

          # ✅ [프론트] ISO-8601 파싱 후 로컬 타임존(KST 등)으로 표시 가능
          # ✅ [백엔드] LocalDateTime 대신 OffsetDateTime/Instant를 쓰면 timezone 혼란 줄어듦


    # ==========================================================
    # Assessment DTO
    # ==========================================================

    AssessmentCreateRequest:
      type: object
      required:
        - jobId
        - healthId
      properties:
        jobId:
          type: integer
          format: int64
          description: 직무 ID
          example: 101

          # ✅ [프론트] 직무 선택 UI에서 jobId를 선택해서 body로 전송
          # ✅ [백엔드] jobId 유효성(존재 여부) 체크는 service에서 필수

        healthId:
          type: integer
          format: int64
          description: 건강 정보 ID
          example: 202

          # ✅ [프론트] 건강정보 선택 UI에서 healthId 선택
          # ✅ [백엔드] healthId 유효성 체크도 service에서 처리


    AssessmentResponse:
      type: object
      required:
        - id
        - status
        - assessedAt
      properties:
        id:
          type: integer
          format: int64
          description: 판단 ID (External ID)
          example: 1001

          # ✅ [프론트] 판단 상세/상태 조회가 생기면 이 id로 라우팅 가능
          # ✅ [백엔드] PK 노출 정책은 장기적으로 UUID 도입 고려 가능

        status:
          type: string
          description: 판단 상태
          enum:
            - PENDING_AI
            - AI_COMPLETED
            - FINALIZED
          example: PENDING_AI

          # ✅ [프론트] 상태에 따라 UI 표시(뱃지/색상/버튼 활성화) 분기
          # ✅ [백엔드] 상태 전이는 service에서만 변경되게(컨트롤러에서 직접 set 금지)

        assessedAt:
          type: string
          format: date-time
          description: 판단 생성 시각 (ISO-8601, UTC)
          example: 2026-02-10T12:00:00Z

          # ✅ [프론트] createdAt처럼 날짜 포맷 통일해서 표시
          # ✅ [백엔드] 생성 시각/판단 시각 의미가 달라지면 필드 분리 필요(예: createdAt vs finalizedAt)

