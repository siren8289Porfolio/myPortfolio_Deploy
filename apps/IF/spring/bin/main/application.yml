# PostgreSQL (웹·앱 공통 백엔드). DB/계정: createdb -O if_user if_spring && createuser -P if_user
# FastAPI(위험도/설명) 주소. ai 서버: cd ai && uvicorn src.app.main:app --port 8000
app:
  ai:
    base-url: http://localhost:8000
server:
  address: 0.0.0.0  # 실기기에서 맥 IP로 접속 가능하도록
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/if_spring
    username: if_user
    password: change-me
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

logging:
  level:
    org.springframework.sql: debug

