server:
  port: ${PORT:8080}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}

spring:
  application:
    name: allochub
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    open-in-view: false

allochub:
  auth:
    operator-token: ${ALLOC_OPERATOR_TOKEN:operator-dev-token}
    admin-token: ${ALLOC_ADMIN_TOKEN:admin-dev-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info
