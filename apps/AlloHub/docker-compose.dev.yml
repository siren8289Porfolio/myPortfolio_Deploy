# AllocHub Dev — back (API :8080) + front (:3000) + PostgreSQL

services:
  db:
    image: postgres:14-alpine
    container_name: allochub-db-dev
    environment:
      POSTGRES_DB: allochub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d allochub"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    container_name: allochub-back-dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/allochub
      ALLOC_OPERATOR_TOKEN: ${ALLOC_OPERATOR_TOKEN:-operator-dev-token}
      ALLOC_ADMIN_TOKEN: ${ALLOC_ADMIN_TOKEN:-admin-dev-token}
      NODE_ENV: production
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  front:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: allochub-front-dev
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://back:8080
      NODE_ENV: production
      PORT: 3000
    depends_on:
      back:
        condition: service_healthy

volumes:
  postgres_data:
