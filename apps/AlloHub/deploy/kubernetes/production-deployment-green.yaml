# Green Pod만 배포 (Deployment Plan 6.3 — Blue-Green 1단계)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allochub-api-green
  namespace: production
  labels:
    app: allochub-api
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: allochub-api
      version: green
  template:
    metadata:
      labels:
        app: allochub-api
        version: green
    spec:
      containers:
        - name: allochub-api
          image: allochub:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: allochub-env-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
