apiVersion: apps/v1
kind: Deployment
metadata:
  name: allochub-api
  namespace: staging
  labels:
    app: allochub-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: allochub-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: allochub-api
    spec:
      containers:
        - name: allochub-api
          image: allochub:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: allochub-db-secret
                  key: url
            - name: ALLOC_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: allochub-auth-secret
                  key: operator-token
            - name: ALLOC_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: allochub-auth-secret
                  key: admin-token
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
