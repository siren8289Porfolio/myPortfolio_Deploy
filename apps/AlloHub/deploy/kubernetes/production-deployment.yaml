apiVersion: v1
kind: Service
metadata:
  name: allochub-api
  namespace: production
spec:
  selector:
    app: allochub-api
    version: green
  ports:
    - port: 443
      targetPort: 3000
      protocol: TCP
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allochub-api-blue
  namespace: production
  labels:
    app: allochub-api
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: allochub-api
      version: blue
  template:
    metadata:
      labels:
        app: allochub-api
        version: blue
    spec:
      containers:
        - name: allochub-api
          image: allochub:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: allochub-env-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allochub-api-green
  namespace: production
  labels:
    app: allochub-api
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: allochub-api
      version: green
  template:
    metadata:
      labels:
        app: allochub-api
        version: green
    spec:
      containers:
        - name: allochub-api
          image: allochub:v1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: allochub-env-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
