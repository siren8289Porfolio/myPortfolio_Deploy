# Kubernetes Secrets 템플릿 (Deployment Plan 8.3)
# 사용: 값을 채운 뒤 kubectl apply -f secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: allochub-db-secret
  namespace: staging
type: Opaque
stringData:
  url: postgresql://admin:CHANGE_ME@rds-staging.example.com:5432/allochub
---
apiVersion: v1
kind: Secret
metadata:
  name: allochub-auth-secret
  namespace: staging
type: Opaque
stringData:
  operator-token: CHANGE_ME_OPERATOR_TOKEN
  admin-token: CHANGE_ME_ADMIN_TOKEN
---
apiVersion: v1
kind: Secret
metadata:
  name: allochub-env-secret
  namespace: production
type: Opaque
stringData:
  DATABASE_URL: postgresql://admin:CHANGE_ME@rds-prod.example.com:5432/allochub
  ALLOC_OPERATOR_TOKEN: CHANGE_ME_OPERATOR_TOKEN
  ALLOC_ADMIN_TOKEN: CHANGE_ME_ADMIN_TOKEN
