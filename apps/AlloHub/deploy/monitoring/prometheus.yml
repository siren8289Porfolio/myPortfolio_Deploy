global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: allochub-api
    metrics_path: /api/metrics
    static_configs:
      - targets: ["back:8080"]
        labels:
          service: allochub-api
          environment: dev
