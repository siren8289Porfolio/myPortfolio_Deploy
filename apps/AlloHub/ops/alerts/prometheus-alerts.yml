# Operation Manual 7장 — Alert 규칙 (Prometheus)
# 마운트: deploy/monitoring/prometheus.yml 의 rule_files 참조

groups:
  - name: allochub-alerts
    rules:
      # ALT-001: API 5xx > 10%
      - alert: ALT001_CriticalErrorRate
        expr: |
          allochub_error_rate_ratio > 0.10
        for: 2m
        labels:
          severity: critical
          alert_id: ALT-001
        annotations:
          summary: "API 5xx > 10%"
          description: "Critical error rate — immediate on-call response required"

      # ALT-002: 에러율 > 5%
      - alert: ALT002_HighErrorRate
        expr: |
          allochub_error_rate_ratio > 0.05
        for: 5m
        labels:
          severity: major
          alert_id: ALT-002
        annotations:
          summary: "Error rate > 5%"
          description: "Elevated 5xx rate — investigate runbook 10.1"

      # ALT-004: DB 연결 실패 (health DOWN)
      - alert: ALT004_DatabaseDown
        expr: |
          up{job="allochub-api"} == 0
        for: 1m
        labels:
          severity: critical
          alert_id: ALT-004
        annotations:
          summary: "Database or API health check failed"
          description: "Runbook 10.2 — DB connection failure"

      # ALT-008: 인증 실패 > 20%
      - alert: ALT008_HighAuthFailureRate
        expr: |
          (
            rate(allochub_auth_failures_total[5m])
            /
            rate(allochub_http_requests_total[5m])
          ) > 0.20
        for: 10m
        labels:
          severity: warning
          alert_id: ALT-008
        annotations:
          summary: "Auth failure rate > 20%"
          description: "Security review — possible brute force"
