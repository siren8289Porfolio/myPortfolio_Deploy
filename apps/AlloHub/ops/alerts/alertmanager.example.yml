# Operation Manual 7장 — Alertmanager 라우팅 예시
# Slack / PagerDuty 연동 시 이 파일을 참고하여 설정

route:
  receiver: slack-devops
  group_by: [alert_id]
  routes:
    - match:
        severity: critical
      receiver: pagerduty-oncall
    - match:
        severity: major
      receiver: slack-devops
    - match:
        severity: warning
      receiver: slack-devops

receivers:
  - name: slack-devops
    slack_configs:
      - api_url: "https://hooks.slack.com/services/CHANGE_ME"
        channel: "#devops"
        title: "{{ .GroupLabels.alert_id }} — {{ .CommonAnnotations.summary }}"

  - name: pagerduty-oncall
    pagerduty_configs:
      - service_key: "CHANGE_ME"
        description: "{{ .CommonAnnotations.summary }}"
