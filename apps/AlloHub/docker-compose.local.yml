# SQLite — back API only (DB in back/data volume)

services:
  back:
    build:
      context: .
      dockerfile: back/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: file:/app/data/allochub.db
      ALLOC_OPERATOR_TOKEN: operator-dev-token
      ALLOC_ADMIN_TOKEN: admin-dev-token
      PORT: 8080
    volumes:
      - allochub_sqlite:/app/data

volumes:
  allochub_sqlite:
