name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # 1️⃣ Build + 2️⃣ Test (Deployment Plan 5.1)
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: allochub_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d allochub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Lint frontend
        run: npm run lint

      - name: Backend tests
        run: cd back && chmod +x gradlew && ./gradlew test

      - name: Build
        run: |
          cd back && ./gradlew build -x test
          npm run build -w front
        env:
          DATABASE_URL: postgresql://admin:admin@localhost:5432/allochub_test

  # 3️⃣ Docker Image 생성 + Push (Deployment Plan 5.1)
  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: back/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4️⃣ Dev 배포 (자동) — develop 브랜치
  deploy-dev:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Dev
        run: |
          docker compose -f docker-compose.dev.yml up -d --build
          echo "Waiting for services..."
          sleep 40

      - name: Health Check
        run: curl -f http://localhost:8080/api/health

      - name: Smoke Test
        run: chmod +x deploy/scripts/smoke-test.sh && ./deploy/scripts/smoke-test.sh http://localhost:8080

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # 5️⃣ Staging 배포 (승인 후) — main 브랜치
  deploy-staging:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Staging deploy instructions
        run: |
          echo "Image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Run: ./deploy/scripts/deploy-staging.sh ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Smoke: curl -f https://staging-api.example.com/api/health"

  # 6️⃣ Production 배포 (수동 승인) — Blue-Green
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Production Blue-Green instructions
        run: |
          echo "Manual approval required"
          echo "Run: ./deploy/scripts/deploy-production.sh ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Rollback: ./deploy/scripts/rollback-production.sh"
